tablist-name-formatting:
  enabled: true
  disable-condition: "%world%=disabledworld"
scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
    - GROUPS:owner,admin,mod,helper,builder,vip,default
    - PLACEHOLDER_A_TO_Z:%player%
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false
  disable-condition: "%world%=disabledworld"
playerlist-objective:
  enabled: true
  value: "%ping%"
  fancy-value: "&7Ping: %ping%"
  title: TAB
  render-type: INTEGER
  disable-condition: "%world%=disabledworld"
scoreboard:
  enabled: true
  toggle-command: /scoreboard
  remember-toggle-choice: false
  hidden-by-default: false
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard-1.20.3+:
      display-condition: "%player-version-id%>=765;%bedrock%=false"
      title: "%animation:scoreboard-title%"
      lines:
        - "&7&m----------------------------"
        - "&f Player Info:"
        - " &8» &fName: &b%player%"
        - " &8» &fRank: &b%group%"
        - ""
        - " &6⛃ &fMoney: &a%vault_eco_balance_formatted%"
        - " "
        - " &b⚡ &fTPS: &a%tps%"
        - " &3✈ &fPing: &f%ping%&7ms"
        - " &d👥 &fOnline: &f%online%"
        - " "
        - "   &7&oplay.eternalsmp.net"
        - "&7&m----------------------------"

    scoreboard:
      display-condition: ""
      title: "%animation:scoreboard-title%"
      lines:
        - "&7&m----------------------------"
        - "&f Player Info:"
        - " &8» &fName: &b%player%"
        - " &8» &fRank: &b%group%"
        - " "
        - " &6➲ &fMoney: &a%vault_eco_balance_formatted%"
        - " &e✦ &fCoins: &e%playerpoints_points_formatted%"
        - " "
        - " &b⚡ &fTPS: &a%tps%"
        - " &3✈ &fPing: &b%ping%&8ms"
        - " &d👥 &fOnline: &b%online%"
        - " "
        - "   &e&oplay.eternalsmp.net"
        - "&7&m----------------------------"

layout:
  enabled: false
  direction: COLUMNS
  default-skin: mineskin:37e93c8e12cd426cb28fce31969e0674
  enable-remaining-players-text: true
  remaining-players-text: "... and %s more"
  empty-slot-ping-value: 1000
  layouts:
    default:
      slot-count: 80
      fixed-slots:
        - "1|&3Website&f:"
        - 2|&bmyserver.net
        - "3|&8&m "
        - "4|&3Name&f:"
        - 5|&b%player%
        - "7|&3Rank&f:"
        - "8|Rank: %group%"
        - "10|&3World&f:"
        - 11|&b%world%
        - "13|&3Time&f:"
        - 14|&b%time%
        - "21|&3Teamspeak&f:"
        - 22|&bts.myserver.net
        - "23|&8&m "
        - "41|&3Store&f:"
        - 42|&bshop.myserver.net
        - "43|&8&m "
      groups:
        staff:
          display-condition: permission:tab.staff
          slots:
            - 24-40
        players:
          slots:
            - 44-80
ping-spoof:
  enabled: false
  value: 0
global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  update-latency: false
  spy-servers:
    - spyserver1
    - spyserver2
  server-groups:
    lobbies:
      - lobby1
      - lobby2
    group2:
      - server1
      - server2
placeholders:
  date-format: dd.MM.yyyy
  time-format: "[HH:mm:ss / h:mm a]"
  time-offset: 0
  register-tab-expansion: false
placeholder-output-replacements:
  "%essentials_vanished%":
    "yes": "&7| Vanished"
    "no": ""
conditions:
  nick:
    conditions:
      - "%player%=%essentials_nickname%"
    true: "%player%"
    false: ~%essentials_nickname%
placeholder-refresh-intervals:
  default-refresh-interval: 500
  "%server_uptime%": 1000
  "%server_tps_1_colored%": 1000
  "%server_unique_joins%": 5000
  "%player_health%": 200
  "%player_ping%": 1000
  "%vault_prefix%": 1000
  "%rel_factionsuuid_relation_color%": 1000
assign-groups-by-permissions: false
primary-group-finding-list:
  - Owner
  - Admin
  - Mod
  - Helper
  - default
permission-refresh-interval: 1000
debug: false
proxy-support:
  enabled: true
  channel-name-suffix: TAB
  type: PLUGIN
  plugin:
    name: RedisBungee
  redis:
    url: redis://:password@localhost:6379/0
  rabbitmq:
    exchange: plugin
    url: amqp://guest:guest@localhost:5672/%2F
components:
  minimessage-support: true
  disable-shadow-for-heads: true
config-version: 5
compensate-for-packetevents-bug: false
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
prevent-spectator-effect:
  enabled: false
belowname-objective:
  fancy-value-default: NPC
  fancy-value: "&c%health%"
  enabled: false
bossbar:
  enabled: false
header-footer:
  enabled: true
mysql:
  enabled: false
per-world-playerlist:
  enabled: false
