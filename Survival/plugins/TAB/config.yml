tablist-name-formatting:
  enabled: true
  disable-condition: "%world%=disabledworld"
scoreboard-teams:
  enabled: true
  enable-collision: true
  invisible-nametags: false
  sorting-types:
    - GROUPS:owner,admin,mod,helper,builder,vip,yodha,default
    - PLACEHOLDER_A_TO_Z:%player%
  case-sensitive-sorting: true
  can-see-friendly-invisibles: false
  disable-condition: "%world%=disabledworld"
playerlist-objective:
  enabled: true
  value: "%ping%"
  fancy-value: "&7Ping: %ping%"
  title: TAB
  render-type: INTEGER
  disable-condition: "%world%=disabledworld"
scoreboard:
  enabled: true
  toggle-command: /scoreboard
  remember-toggle-choice: false
  hidden-by-default: false
  delay-on-join-milliseconds: 0
  scoreboards:
    scoreboard-1.20.3+:
      display-condition: "%player-version-id%>=765;%bedrock%=false"
      title: "%animation:scoreboard-title%"
      lines:
        - "&7&m------------------"
        - "&f Player Info:"
        - " &8» &fName: &b%player%"
        - " &8» &fRank: &b%group%"
        - " &8» &fKills: &c%statistic_player_kills%"
        - " &8» &fDeaths: &c%statistic_deaths%"
        - ""
        - " &6⛃ &fMoney: &a%vault_eco_balance_formatted%"
        - " "
        - " &b⚡ &fTPS: &a%tps%"
        - " &3✈ &fPing: &f%ping%&7ms"
        - " &d👥 &fOnline: &f%online%"
        - " "
        - "   &7&oplay.eternalsmp.net"
        - "&7&m------------------"

    scoreboard:
      display-condition: ""
      title: "%animation:scoreboard-title%"
      lines:
        - "&7&m----------------------------"
        - "&f Player Info:"
        - " &8» &fName: &b%player%"
        - " &8» &fRank: &b%group%"
        - " &8» &fKills: &c%statistic_player_kills%"
        - " &8» &fDeaths: &c%statistic_deaths%"
        - " "
        - " &6➲ &fMoney: &a%vault_eco_balance_formatted%"
        - " &e✦ &fCoins: &e%playerpoints_points_formatted%"
        - " "
        - " &b⚡ &fTPS: &a%tps%"
        - " &3✈ &fPing: &b%ping%&8ms"
        - " &d👥 &fOnline: &b%online%"
        - " "
        - "   &e&oplay.eternalsmp.net"
        - "&7&m----------------------------"

layout:
  enabled: true
  direction: COLUMNS
  default-skin: mineskin:37e93c8e12cd426cb28fce31969e0674
  enable-remaining-players-text: true
  remaining-players-text: "&8... +%s more"
  empty-slot-ping-value: 1000
  layouts:
    default:
      slot-count: 80
      fixed-slots:
        # ── Column 1: Staff ──
        - "1|&6&lSTAFF"
        - "2|&8&m                    "
        # ── Column 2: Special Ranks ──
        - "21|&a&lVIP / SPECIAL"
        - "22|&8&m                    "
        # ── Column 3: Members ──
        - "41|&e&lMEMBERS"
        - "42|&8&m                    "
        # ── Column 4: Server Info ──
        - "61|&6&lETERNAL SMP"
        - "62|&8&m                    "
        - "63|&7Online: &f%online%"
        - "64|&7TPS: &a%tps%"
        - "65|&7Your Ping: &f%ping%&7ms"
        - "66|&7Rank: &b%group%"
        - "67| "
        - "68|&eplay.eternalsmp.net"
      groups:
        owner:
          display-condition: "%group%=Owner"
          slots:
            - 3-10
        admin:
          display-condition: "%group%=Admin"
          slots:
            - 3-10
        mod:
          display-condition: "%group%=Mod"
          slots:
            - 11-20
        helper:
          display-condition: "%group%=Helper"
          slots:
            - 11-20
        builder:
          display-condition: "%group%=builder"
          slots:
            - 23-30
        vip:
          display-condition: "%group%=vip"
          slots:
            - 23-40
        yodha:
          display-condition: "%group%=yodha"
          slots:
            - 31-40
        default:
          slots:
            - 43-60
            - 69-80
ping-spoof:
  enabled: false
  value: 0
global-playerlist:
  enabled: false
  display-others-as-spectators: false
  display-vanished-players-as-spectators: true
  isolate-unlisted-servers: false
  update-latency: false
  spy-servers:
    - spyserver1
    - spyserver2
  server-groups:
    lobbies:
      - lobby1
      - lobby2
    group2:
      - server1
      - server2
placeholders:
  date-format: dd.MM.yyyy
  time-format: "[HH:mm:ss / h:mm a]"
  time-offset: 0
  register-tab-expansion: false
placeholder-output-replacements:
  "%essentials_vanished%":
    "yes": "&7| Vanished"
    "no": ""
conditions:
  nick:
    conditions:
      - "%player%=%essentials_nickname%"
    true: "%player%"
    false: ~%essentials_nickname%
placeholder-refresh-intervals:
  default-refresh-interval: 500
  "%server_uptime%": 1000
  "%server_tps_1_colored%": 1000
  "%server_unique_joins%": 5000
  "%player_health%": 200
  "%player_ping%": 1000
  "%vault_prefix%": 1000
  "%rel_factionsuuid_relation_color%": 1000
assign-groups-by-permissions: false
primary-group-finding-list:
  - Owner
  - Admin
  - Mod
  - Helper
  - yodha
  - default
permission-refresh-interval: 1000
debug: false
proxy-support:
  enabled: true
  channel-name-suffix: TAB
  type: PLUGIN
  plugin:
    name: RedisBungee
  redis:
    url: redis://:password@localhost:6379/0
  rabbitmq:
    exchange: plugin
    url: amqp://guest:guest@localhost:5672/%2F
components:
  minimessage-support: true
  disable-shadow-for-heads: true
config-version: 5
compensate-for-packetevents-bug: false
use-bukkit-permissions-manager: false
use-online-uuid-in-tablist: true
prevent-spectator-effect:
  enabled: false
belowname-objective:
  fancy-value-default: NPC
  fancy-value: "&c%health%"
  enabled: false
bossbar:
  enabled: false
header-footer:
  enabled: true
mysql:
  enabled: false
per-world-playerlist:
  enabled: false
